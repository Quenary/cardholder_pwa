<mat-list>
  <mat-list-item>
    <ng-container
      matListItemIcon
      [ngTemplateOutlet]="statusIconTemplate"
      [ngTemplateOutletContext]="{
        status: health.value()
      }">
    </ng-container>
    <span matListItemTitle>
      {{ 'ADMIN.HEALTH' | translate }}
    </span>
  </mat-list-item>
  <mat-list-item>
    <ng-container
      matListItemIcon
      [ngTemplateOutlet]="statusIconTemplate"
      [ngTemplateOutletContext]="{
        status: smtpStatus.value()
      }">
    </ng-container>
    <span matListItemTitle>
      {{ 'ADMIN.SMTP_STATUS' | translate }}
      <button
        class="mat-list-button"
        mat-button
        [showProgress]="smtpLoading()"
        [disabled]="!smtpStatus.value()"
        (click)="onSmtpTest()">
        <mat-icon>mail</mat-icon>
        {{ 'ADMIN.SMTP_TEST' | translate }}

        <mat-progress-spinner
          progressIndicator
          mode="indeterminate"
          diameter="20"
          aria-label="Loading"
          tabindex="" />
      </button>
    </span>
  </mat-list-item>
</mat-list>

<ng-template
  #statusIconTemplate
  let-status="status">
  <mat-icon
    matListItemIcon
    [style.color]="status ? null : 'var(--mat-sys-error)'">
    @if (status) {
      check_circle
    } @else {
      warning_outlined
    }
  </mat-icon>
</ng-template>

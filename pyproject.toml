[project]
name = "cardholder_pwa"
version = "1.8.2"
description = "Cardholder PWA is a self-hosted app for your loyalty and discount cards"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "aiosqlite>=0.22.1",
    "alembic>=1.18.4",
    "asyncmy>=0.2.11",
    "asyncpg>=0.31.0",
    "bcrypt>=5.0.0",
    "dotenv>=0.9.9",
    "fastapi>=0.138.0",
    "pydantic[email]>=2.13.4",
    "python-jose>=3.5.0",
    "python-multipart>=0.0.32",
    "uvicorn>=0.49.0",
]

[tool.uv]
package = false

[dependency-groups]
dev = [
    "fastapi-cli>=0.0.27",
    "fastapi[standard]>=0.138.0",
    "mypy>=2.1.0",
    "pre-commit>=4.6.0",
    "pytest>=9.1.1",
    "pytest-asyncio>=1.4.0",
    "pytest-mock>=3.15.1",
    "ruff>=0.15.18",
    "uvicorn[standard]>=0.49.0",
    "watchfiles>=1.2.0",
    "websockets>=16.0",
]

[tool.semantic_release]
version_toml = ["pyproject.toml:project.version"]
build_command = """
    pip install uv~=0.9
    uv lock --upgrade-package "$PACKAGE_NAME"
    git add uv.lock
"""
commit_parser = "conventional"
commit_message = "chore(release): {version}\n\nAutomatically generated by python-semantic-release"
major_on_zero = true
version_variable = []
upload_to_pypi = false
upload_to_repository = false
commit_version_number = false
tag_format = "v{version}"

[semantic_release.commit_parser_options]
minor_tags = ["feat"]
patch_tags = ["fix", "perf"]
other_allowed_tags = ["build", "chore", "ci", "docs", "style", "refactor", "test"]
allowed_tags = ["feat", "fix", "perf", "build", "chore", "ci", "docs", "style", "refactor", "test"]
default_bump_level = 0
parse_squash_commits = true
ignore_merge_commits = true

[tool.semantic_release.changelog.default_templates]
changelog_file = "CHANGELOG.md"
output_format = "md"

[tool.semantic_release.changelog]
# Recommended patterns for conventional commits parser that is scope aware
exclude_commit_patterns = [
    '''chore(?:\([^)]*?\))?: .+''',
    '''ci(?:\([^)]*?\))?: .+''',
    '''refactor(?:\([^)]*?\))?: .+''',
    '''style(?:\([^)]*?\))?: .+''',
    '''test(?:\([^)]*?\))?: .+''',
    '''build\((?!deps\): .+)''',
    '''Initial [Cc]ommit.*''',
]
mode = "init"

[tool.ruff]
target-version = "py313"

lint.select = [
  "E",   # pycodestyle errors
  "F",   # pyflakes
  "I",   # import sorting
  "B",   # bugbear
  "UP",  # pyupgrade
]

lint.ignore = [
  "E501",  # line too long (если используешь formatter)
  "B008",  # Checks for function calls in default function arguments
]


[tool.mypy]
ignore_missing_imports = true
no_strict_optional = true

[[tool.mypy.overrides]]
module = "cachetools.*"
ignore_missing_imports = true
